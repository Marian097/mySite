version: "3.9"

services:
  db:
    image: postgres:16
    container_name: mysite_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
      POSTGRES_DB: mysite
    ports:
      - "5433:5432"
    volumes:
      - ./pd_data:/var/lib/postgresql/data